      responses:
        "200":
          description: Updated cart detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Checkout]
      summary: Remove a product line from the cart
      security:
        - bearerAuth: []
        - authCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cart detail
          content:
