  /api/v1/invoices/{id}/pay:
    post:
      tags: [Invoices]
      summary: Start payment for a pending invoice (Stripe hook point)
      description: >
        Allowed for the invoice owner (order user) or an admin. Invoice must be `pending`.
        Stripe Checkout is not implemented yet; response returns the same invoice snapshot plus a `payment` object
        with null Stripe fields and a note. When integrated, this endpoint will create a Stripe session and return
        `stripe_checkout_url` / `stripe_checkout_session_id`; successful payment will set the invoice to `paid` (e.g. webhook).
      security:
        - bearerAuth: []
        - authCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice detail plus payment stub
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoicePayResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invoice is not in pending status
          $ref: "#/components/responses/Conflict"
