openapi: 3.0.3
info:
  title: StripeDesk API
  version: "1.0.0"
  description: |
    OpenAPI documentation for the StripeDesk REST API.

    Notes:
    - All application API routes are prefixed with `/api/v1`.
    - Most successful responses use the envelope `{ success: true, data: ... }`.
    - Most error responses use the envelope `{ success: false, error: { code, message } }`.
servers:
  - url: /
    description: Same host
tags:
  - name: Auth
  - name: Catalog
  - name: Checkout
  - name: Invoices
  - name: Receipts
  - name: Admin Users
  - name: Admin Products
  - name: Admin Currencies
  - name: Admin Stripe Logs
  - name: Webhooks
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    authCookie:
      type: apiKey
      in: cookie
      name: stripedesk_access_token
    refreshCookie:
      type: apiKey
      in: cookie
      name: stripedesk_refresh_token
  schemas:
    ErrorBody:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: validation_error
            message:
              type: string
              example: Human-readable message
            intent:
              type: string
              example: registration
              nullable: true
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: jane@stripedesk.local
        password:
          type: string
          format: password
          example: Password123!
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Jane Smith
        email:
          type: string
          format: email
          example: jane@stripedesk.local
        password:
          type: string
          format: password
          example: Password123!
    ForgotRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: jane@stripedesk.local
    VerifyOtpRequest:
      type: object
      required: [email, otp, intent]
      properties:
        email:
          type: string
          format: email
          example: jane@stripedesk.local
        otp:
          type: string
          example: "123456"
        intent:
          type: string
          enum: [registration, account_activation, reset_password]
    ResetPasswordRequest:
      type: object
      required: [email, reset_token, new_password]
      properties:
        email:
          type: string
          format: email
          example: jane@stripedesk.local
        reset_token:
          type: string
          example: generated-reset-token
        new_password:
          type: string
          format: password
          example: NewPassword123!
    TokenPayload:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 86400
    RefreshResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [ok]
              example: ok
    LoginResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            requires_verification:
              type: boolean
              example: false
    LoginVerificationRequiredResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            requires_verification:
              type: boolean
              example: true
            intent:
              type: string
              enum: [registration, account_activation]
    RegisterResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            id:
              type: integer
              example: 2
            email:
              type: string
              format: email
              example: jane@stripedesk.local
            requires_verification:
              type: boolean
              example: true
    ForgotResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            status:
              type: string
              example: ok
    ResendRequest:
      type: object
      required: [email, intent]
      properties:
        email:
          type: string
          format: email
          example: jane@stripedesk.local
        intent:
          type: string
          enum: [registration, account_activation, reset_password]
    ResendResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            status:
              type: string
              example: ok
            requires_verification:
              type: boolean
              example: true
            intent:
              type: string
              enum: [registration, account_activation, reset_password]
    VerifyOtpTokenResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            requires_verification:
              type: boolean
              example: false
    VerifyOtpResetResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            reset_token:
              type: string
              example: generated-reset-token
            reset_expires_at:
              type: string
              format: date-time
              example: "2026-03-31T12:00:00Z"
    ResetPasswordResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            status:
              type: string
              example: ok
    UserProfile:
      type: object
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          example: Jane Smith
        email:
          type: string
          format: email
          example: jane@stripedesk.local
        role:
          type: string
          enum: [admin, user]
        created_at:
          type: string
          example: "2026-03-31 00:00:00"
    UserProfileResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/UserProfile"
    ProductCatalogItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Basic Plan
        description:
          type: string
          nullable: true
          example: Access to core features for individuals.
        price:
          type: string
          example: "29.99"
        currency_code:
          type: string
          example: USD
        stripe_price_id:
          type: string
          nullable: true
          example: price_123
    ProductCatalogResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProductCatalogItem"
    CheckoutSessionRequest:
      type: object
      properties:
        product_id:
          type: integer
          example: 1
        cart_id:
          type: integer
          nullable: true
          example: 10
        quantity:
          type: integer
          nullable: true
          example: 1
    CheckoutSessionResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          additionalProperties: true
          example:
            order_id: 12
            checkout_session_id: cs_test_123
            checkout_url: https://checkout.stripe.com/c/pay/cs_test_123
    CheckoutInvoiceRequest:
      type: object
      required: [cart_id]
      properties:
        cart_id:
          type: integer
          example: 3
    InvoiceStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, unpaid, paid, void]
          example: paid
    InvoicePayResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          description: Invoice + order + lines plus payment stub (Stripe fields null until integrated)
          additionalProperties: true
    CartCreateLineItem:
      type: object
      required: [product_id]
      properties:
        product_id:
          type: integer
          example: 1
        quantity:
          type: integer
          nullable: true
          example: 1
    CartCreateRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartCreateLineItem"
        expires_days:
          type: integer
          minimum: 1
          maximum: 30
          nullable: true
          example: 7
    CartAddItemRequest:
      type: object
      required: [product_id]
      properties:
        product_id:
          type: integer
          example: 1
        quantity:
          type: integer
          minimum: 1
          maximum: 25
          nullable: true
          example: 1
    CartLineQuantityRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1
          maximum: 25
          example: 1
    CartLine:
      type: object
      required: [product_id, product_name, quantity, price, line_total]
      properties:
        product_id:
          type: integer
          example: 1
        product_name:
          type: string
          example: Basic Plan
        product_description:
          type: string
          nullable: true
          example: Full access for one seat.
        quantity:
          type: integer
          example: 2
        price:
          type: string
          description: Unit price snapshot stored on the line
          example: "29.99"
        line_total:
          type: string
          description: quantity Ã— price, two decimal places
          example: "59.98"
        currency_id:
          type: integer
          nullable: true
          example: 1
    CartDetail:
      type: object
      required: [cart, lines]
      properties:
        cart:
          type: object
          additionalProperties: true
        lines:
          type: array
          items:
            $ref: "#/components/schemas/CartLine"
    CartDetailResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/CartDetail"
    InvoiceSummary:
      type: object
      additionalProperties: true
      example:
        id: 1
        invoice_number: INV-20260331-00001
        total: "29.99"
        currency: USD
        issued_at: "2026-03-31 12:00:00"
        product_name: Basic Plan
    InvoiceListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceSummary"
    InvoiceDetail:
      type: object
      additionalProperties: true
      example:
        id: 1
        invoice_number: INV-20260331-00001
        subtotal: "29.99"
        tax: "0.00"
        total: "29.99"
        currency: USD
        issued_at: "2026-03-31 12:00:00"
        product_name: Basic Plan
        user_name: Jane Smith
        user_email: jane@stripedesk.local
    InvoiceDetailResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/InvoiceDetail"
    ReceiptDetail:
      type: object
      additionalProperties: true
      example:
        id: 1
        receipt_number: RCP-20260331-00001
        invoice_number: INV-20260331-00001
        amount_paid: "29.99"
        currency: USD
        stripe_payment_intent: pi_123
        paid_at: "2026-03-31 12:00:00"
        product_name: Basic Plan
        user_name: Jane Smith
    ReceiptDetailResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/ReceiptDetail"
    AdminUser:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Admin User
        email:
          type: string
          format: email
          example: admin@stripedesk.local
        role:
          type: string
          example: admin
        created_at:
          type: string
          example: "2026-03-31 00:00:00"
    AdminUserListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
    AdminCreateUserRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AdminCreateUserResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          additionalProperties: true
          example:
            id: 10
            role: admin
            requires_verification: true
            intent: account_activation
    AdminDeleteUserResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          additionalProperties: true
          example:
            id: 10
            deleted: true
    AdminProduct:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: string
        currency_code:
          type: string
        stripe_price_id:
          type: string
          nullable: true
        deleted_at:
          type: string
          nullable: true
        created_at:
          type: string
    AdminProductListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminProduct"
    AdminProductUpsertRequest:
      type: object
      properties:
        name:
          type: string
          example: Pro Plan
        description:
          type: string
          nullable: true
        price:
          oneOf:
            - type: string
            - type: number
          example: "49.99"
        currency_code:
          type: string
          example: USD
    IdResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            id:
              type: integer
              example: 1
    Currency:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
          example: USD
        numeric_code:
          type: string
          nullable: true
          example: "840"
        name:
          type: string
          example: US Dollar
        minor_unit:
          type: integer
          example: 2
        symbol:
          type: string
          nullable: true
          example: $
        is_default:
          type: boolean
          example: true
        created_at:
          type: string
          example: "2026-03-31 00:00:00"
    CurrencyListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Currency"
    CurrencyCreateRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          example: USD
        numeric_code:
          type: string
          nullable: true
          example: "840"
        name:
          type: string
          example: US Dollar
        minor_unit:
          type: integer
          example: 2
        symbol:
          type: string
          nullable: true
          example: $
        is_default:
          type: boolean
          example: true
    CurrencyUpdateRequest:
      type: object
      properties:
        name:
          type: string
        numeric_code:
          type: string
          nullable: true
        minor_unit:
          type: integer
        symbol:
          type: string
          nullable: true
        is_default:
          type: boolean
    StripeLog:
      type: object
      properties:
        id:
          type: integer
        event_type:
          type: string
          example: checkout.session.completed
        created_at:
          type: string
          example: "2026-03-31 12:00:00"
        payload:
          type: object
          additionalProperties: true
    StripeLogListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/StripeLog"
  responses:
    BadRequest:
      description: Bad request or validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    Unauthorized:
      description: Missing, invalid, or expired JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    Forbidden:
      description: Insufficient permissions or blocked flow
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    Conflict:
      description: Request conflicts with current state â€” e.g. `cart_already_exists` when the user already has an active cart
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      description: |
        On successful verified login, the API sets both `stripedesk_access_token`
        and `stripedesk_refresh_token` HttpOnly cookies. The JSON body no longer
        returns token values.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded or verification required
          headers:
            Set-Cookie:
              description: Set on verified login with the access and refresh auth cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginResponse"
                  - $ref: "#/components/schemas/LoginVerificationRequiredResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access and refresh tokens (cookie-only)
      description: |
        Reads the refresh JWT from the **refresh HttpOnly cookie** only (no token in the request body). Issues new access and refresh tokens and returns them **only** via `Set-Cookie` headers, same as login. The JSON body does not contain tokens â€” only `{ "data": { "status": "ok" } }` on success.

        Call this with `credentials: 'include'` (fetch) or equivalent so the browser sends cookies cross-origin when `CORS_ALLOW_ORIGIN` and cookie `SameSite`/`Secure` allow it.
      security: []
      responses:
        "200":
          description: New tokens set on cookies; no tokens in JSON
          headers:
            Set-Cookie:
              description: Updated access and refresh auth cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a user account
      description: Creates a normal user account and starts OTP email verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/auth/resend:
    post:
      tags: [Auth]
      summary: Resend OTP
      description: Resends the OTP for registration, account activation, or password reset.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendRequest"
      responses:
        "200":
          description: OTP resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/auth/forgot:
    post:
      tags: [Auth]
      summary: Request password reset OTP
      description: Available only for user accounts. Admin accounts are rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotRequest"
      responses:
        "200":
          description: OTP issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify an OTP
      description: |
        Supported intents:
        - registration
        - account_activation
        - reset_password

        For `registration` and `account_activation`, the API sets the auth cookie in the
        `Set-Cookie` response header instead of returning `access_token` in the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: OTP verified
          headers:
            Set-Cookie:
              description: Set for registration/account_activation flows after successful verification with access and refresh auth cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/VerifyOtpTokenResponse"
                  - $ref: "#/components/schemas/VerifyOtpResetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using a verified reset token
      description: |
        Available only for user accounts.

        On success, the API sets both auth cookies in the `Set-Cookie` response
        header instead of returning token fields in the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset succeeded
          headers:
            Set-Cookie:
              description: Set on successful password reset with access and refresh auth cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
        - authCookie: []
      responses:
        "200":
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/products:
    get:
      tags: [Catalog]
      summary: List active products
      security:
        - bearerAuth: []
        - authCookie: []
      responses:
        "200":
          description: Product catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCatalogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/checkout/session:
    post:
      tags: [Checkout]
      summary: Create Stripe Checkout session
      description: Normal users only. Admin users cannot purchase products.
      security:
        - bearerAuth: []
        - authCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutSessionRequest"
      responses:
        "201":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/checkout/invoice:
    post:
      tags: [Checkout]
      summary: Create invoice from cart (no Stripe)
      description: >
        Creates a pending `orders` row, copies cart lines to `order_items`, creates an invoice with status `pending`
        (awaiting payment via `POST /api/v1/invoices/{id}/pay` when Stripe is integrated), and marks the cart `converted`.
        Normal users only. The authenticated user must own `cart_id` (`403` otherwise). Same cart rules as Stripe checkout (active, not expired, has lines).
        Response body matches `GET /api/v1/invoices/{id}` (invoice + order + lines).
      security:
        - bearerAuth: []
        - authCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInvoiceRequest"
      responses:
        "201":
          description: Invoice created; full detail in data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/carts:
    post:
      tags: [Checkout]
      summary: Create cart blueprint (invoice draft)
      description: >
        Each user may have at most one cart with status `active`. If the authenticated user
        already has an active cart (even if expired), the API returns 409; use
        `POST /api/v1/users/{userId}/cart/items` or the existing cart id to add lines instead.
      security:
        - bearerAuth: []
        - authCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartCreateRequest"
      responses:
        "201":
          description: Cart created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/carts/{id}:
    get:
      tags: [Checkout]
      summary: Get cart blueprint detail
      security:
        - bearerAuth: []
        - authCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cart detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/users/{userId}/cart:
    get:
      tags: [Checkout]
      summary: Get active cart for a user (by user id)
      description: >
        Returns the latest active, non-expired cart for the given user id.
        Normal users may only use their own id; admins may use any id.
        If the user has no qualifying cart, the API responds with 404.
      security:
        - bearerAuth: []
        - authCookie: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cart detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/users/{userId}/cart/items:
    post:
      tags: [Checkout]
      summary: Add product to a user's cart (by user id)
      description: >
        Resolves the user's latest active, non-expired cart, or creates an empty one if needed,
        then adds or merges the line. Same rules as POST /api/v1/carts/{id}/items.
        Normal users may only use their own id; admins may use any id.
      security:
        - bearerAuth: []
        - authCookie: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartAddItemRequest"
      responses:
        "200":
          description: Updated cart detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/carts/{id}/items:
    post:
      tags: [Checkout]
      summary: Add product to cart (merge quantity if line exists)
      description: >
        Appends quantity to an active, non-expired cart. If the product is already in the cart,
        quantities are merged (capped at 25 per product). Returns the full cart detail with line totals.
      security:
        - bearerAuth: []
        - authCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartAddItemRequest"
      responses:
        "200":
          description: Updated cart detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/carts/{id}/items/{productId}:
    patch:
      tags: [Checkout]
      summary: Update quantity for a cart line
      description: >
        Sets the line quantity for the given product on the cart (active, non-expired).
        Use `DELETE` on this path to remove the line entirely.
      security:
        - bearerAuth: []
        - authCookie: []
      parameters:
        - name: id
          in: path
